# Build from source when module is cloned into modules/ancroo-backend/.
# module.sh does NOT auto-load this file.
# To use: add modules/ancroo-backend/compose.build.yml to COMPOSE_FILE in .env

services:
  ancroo-backend:
    image: ghcr.io/ancroo/ancroo-backend:latest
    build:
      context: ../ancroo-backend
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
