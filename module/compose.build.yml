# Build from source when module is cloned into modules/ancroo/.
# module.sh does NOT auto-load this file.
# To use: add modules/ancroo/compose.build.yml to COMPOSE_FILE in .env

services:
  ancroo-backend:
    image: ghcr.io/stefan-schmidbauer/ancroo-backend:latest
    build:
      context: ./modules/ancroo
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
