{% if success %}
<div class="bg-green-50 border border-green-200 rounded-lg p-3">
    <div class="flex items-center gap-2 mb-1">
        <span class="text-xs font-semibold text-green-700">Success</span>
        {% if duration_ms %}
        <span class="text-xs text-green-600">{{ duration_ms }}ms</span>
        {% endif %}
    </div>
    {% if output %}
    <pre class="text-sm text-green-900 whitespace-pre-wrap font-mono bg-white border border-green-100 rounded p-2 mt-1">{{ output }}</pre>
    {% endif %}
</div>
{% else %}
<div class="bg-red-50 border border-red-200 rounded-lg p-3">
    <div class="text-xs font-semibold text-red-700 mb-1">Error</div>
    <div class="text-sm text-red-600">{{ error }}</div>
</div>
{% endif %}
