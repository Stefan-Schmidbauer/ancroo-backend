{% extends "base.html" %}
{% block title %}Ancroo Admin - New Workflow{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <h1 class="text-lg font-semibold text-gray-900 mb-4">New Workflow</h1>

    <form method="post" action="/admin/workflows" id="workflow-form">

        <!-- Step 1: Choose Type -->
        <div class="bg-white rounded-lg border p-4 mb-4">
            <h2 class="text-sm font-semibold text-gray-700 mb-3">Workflow Type</h2>

            <div class="space-y-2">
                <label class="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                    <input type="radio" name="workflow_type" value="text_transformation" checked
                        class="mt-0.5"
                        hx-get="/admin/workflows/new/form?type=text_transformation"
                        hx-target="#type-form"
                        hx-swap="innerHTML">
                    <div>
                        <div class="text-sm font-medium text-gray-900">Text Transformation</div>
                        <div class="text-xs text-gray-500">Select text &rarr; AI processes it &rarr; Replace text. Simplest type.</div>
                    </div>
                </label>

                <label class="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                    <input type="radio" name="workflow_type" value="workflow_trigger"
                        class="mt-0.5"
                        hx-get="/admin/workflows/new/form?type=workflow_trigger"
                        hx-target="#type-form"
                        hx-swap="innerHTML">
                    <div>
                        <div class="text-sm font-medium text-gray-900">Trigger Workflow</div>
                        <div class="text-xs text-gray-500">Collect data &rarr; n8n &rarr; Return result. For complex tasks.</div>
                    </div>
                </label>

                <label class="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                    <input type="radio" name="workflow_type" value="custom"
                        class="mt-0.5"
                        hx-get="/admin/workflows/new/form?type=custom"
                        hx-target="#type-form"
                        hx-swap="innerHTML">
                    <div>
                        <div class="text-sm font-medium text-gray-900">Custom</div>
                        <div class="text-xs text-gray-500">Full HTTP control: URL, payload, response mapping. For advanced users.</div>
                    </div>
                </label>

                <label class="flex items-start gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50 transition has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                    <input type="radio" name="workflow_type" value="speech_to_text"
                        class="mt-0.5"
                        hx-get="/admin/workflows/new/form?type=speech_to_text"
                        hx-target="#type-form"
                        hx-swap="innerHTML">
                    <div>
                        <div class="text-sm font-medium text-gray-900">Speech to Text</div>
                        <div class="text-xs text-gray-500">Record audio &rarr; Whisper transcribes &rarr; Text to clipboard.</div>
                    </div>
                </label>
            </div>
        </div>

        <!-- Step 2: Type-specific form (loaded via HTMX) -->
        <div id="type-form"
             hx-get="/admin/workflows/new/form?type=text_transformation"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="text-sm text-gray-400 text-center py-8">Loading...</div>
        </div>

        <!-- Submit -->
        <div class="flex items-center gap-3 mt-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition text-sm">
                Create Workflow
            </button>
            <a href="/admin/" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>

    <div class="mt-6 pt-4 border-t">
        <a href="/admin/workflows/new/legacy" class="text-xs text-gray-400 hover:text-gray-600">
            Legacy: Create pipeline workflow &rarr;
        </a>
    </div>
</div>
{% endblock %}
